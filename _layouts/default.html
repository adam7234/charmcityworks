<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Global site CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}" />

    <!-- Page-specific CSS -->
    {% if page.page_css %}
      <link rel="stylesheet" href="{{ page.page_css | relative_url }}" />
    {% endif %}

    <!-- Global fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Home page fonts -->
    {% if page.home_fonts %}
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;700&family=Barlow+Condensed:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    {% endif %}

    <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
  </head>

  <body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>
    {% include navbar.html %}

    <main class="pt-0 pb-4">
      {{ content }}
    </main>

    {% include footer.html %}

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      (function () {
        const btn = document.getElementById("navToggle");
        const nav = document.getElementById("mainNav");
        if (!btn || !nav) return;

        const bsCollapse = window.bootstrap && window.bootstrap.Collapse
          ? window.bootstrap.Collapse.getOrCreateInstance(nav, { toggle: false })
          : null;

        const setExpanded = (open) => btn.setAttribute("aria-expanded", open ? "true" : "false");

        btn.addEventListener("click", () => {
          if (bsCollapse) {
            nav.classList.contains("show") ? bsCollapse.hide() : bsCollapse.show();
          } else {
            nav.classList.toggle("show");
          }
          setExpanded(nav.classList.contains("show"));
        });

        nav.querySelectorAll("a.nav-link, a.btn").forEach((a) => {
          a.addEventListener("click", () => {
            if (window.matchMedia("(max-width: 991.98px)").matches) {
              if (bsCollapse) bsCollapse.hide();
              else nav.classList.remove("show");
              setExpanded(false);
            }
          });
        });

        nav.addEventListener("shown.bs.collapse", () => setExpanded(true));
        nav.addEventListener("hidden.bs.collapse", () => setExpanded(false));
      })();
    </script>
  </body>
</html>
