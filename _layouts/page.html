---
layout: default
---
<!-- This layout wraps regular content pages in a readable centered container. -->
<div class="page-shell">
  <div class="container py-4 py-lg-5">
    <div class="row justify-content-center">
      <div class="col-xl-10">
        <header class="page-header mb-4">
          <h1 class="display-6 mb-2">{{ page.title }}</h1>
          {% if page.subtitle %}
            <p class="lead text-secondary mb-0">{{ page.subtitle }}</p>
          {% endif %}
        </header>

        <!-- Shared article styles make markdown pages easier to read. -->
        <article class="page-panel content">
          {{ content }}
        </article>
      </div>
    </div>
  </div>
</div>
